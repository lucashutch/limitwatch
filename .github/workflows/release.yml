name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Linux release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: limitwatch-rs
      - name: Build release binary
        working-directory: limitwatch-rs
        run: cargo build --release --locked
      - name: Package release binary
        run: |
          mkdir dist
          cp limitwatch-rs/target/release/limitwatch dist/limitwatch-linux-x86_64
          sha256sum dist/limitwatch-linux-x86_64 > dist/limitwatch-linux-x86_64.sha256
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
